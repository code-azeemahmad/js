<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Api Request and V8 Engine</title>
  <style>
  table {
    border-collapse: collapse;
    width: 50%;
    font-family: Arial;
  }
  th {
    background-color: #333;
    color: white;
  }
  th, td {
    padding: 10px;
    text-align: left;
    border: 1px solid #ccc;
  }
  tr:nth-child(even) {
    background-color: #6d6d6d;
  }
</style>
</head>
<body style="background-color: #212121; display: flex; color: white;">
  <table border="1" cellpadding="8" cellspacing="0">
  <thead>
    <tr>
      <th>Value</th>
      <th>State</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>0</td>
      <td>UNSENT</td>
      <td>Client has been created. open() not called yet.</td>
    </tr>
    <tr>
      <td>1</td>
      <td>OPENED</td>
      <td>open() has been called.</td>
    </tr>
    <tr>
      <td>2</td>
      <td>HEADERS_RECEIVED</td>
      <td>send() has been called, and headers and status are available.</td>
    </tr>
    <tr>
      <td>3</td>
      <td>LOADING</td>
      <td>Downloading; responseText holds partial data.</td>
    </tr>
    <tr>
      <td>4</td>
      <td>DONE</td>
      <td>The operation is complete.</td>
    </tr>
  </tbody>
</table>
</body>
<script src="script.js"></script>
</html>
